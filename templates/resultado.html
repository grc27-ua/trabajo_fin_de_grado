<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ruta generada · Rutas Culturales Alicante</title>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

    <style>
        :root {
            --cream: #F5F0E8;
            --cream-dark: #EDE6D6;
            --ink: #1A1612;
            --ink-light: #4A4238;
            --terracotta: #C1440E;
            --terracotta-light: #D4612E;
            --gold: #B8954A;
            --border: #D4C9B0;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'DM Sans', sans-serif;
            background-color: var(--cream);
            color: var(--ink);
            min-height: 100vh;
        }

        header {
            background-color: var(--ink);
            padding: 0 48px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 68px;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.2rem;
            color: var(--cream);
            letter-spacing: 0.04em;
            text-decoration: none;
        }
        .logo span { color: var(--terracotta); }

        .btn-back {
            font-size: 0.75rem;
            font-weight: 500;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--cream);
            text-decoration: none;
            border: 1px solid rgba(245,240,232,0.3);
            padding: 8px 20px;
            transition: all 0.2s;
        }
        .btn-back:hover { background: var(--cream); color: var(--ink); }

        .page-layout {
            display: grid;
            grid-template-columns: 340px 1fr;
            height: calc(100vh - 68px);
        }

        /* SIDEBAR */
        .sidebar {
            background: var(--cream-dark);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar-header {
            padding: 24px 28px 16px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .sidebar-eyebrow {
            font-size: 0.65rem;
            font-weight: 500;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--terracotta);
            margin-bottom: 6px;
        }

        .sidebar-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem;
            line-height: 1.2;
            color: var(--ink);
            margin-bottom: 14px;
        }

        .stats-row {
            display: flex;
            gap: 0;
            margin-bottom: 16px;
        }

        .stat-box {
            flex: 1;
            padding: 10px 0;
            text-align: center;
            border: 1px solid var(--border);
            background: var(--cream);
        }
        .stat-box + .stat-box { border-left: none; }

        .stat-box-num {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            color: var(--ink);
            line-height: 1;
            display: block;
        }
        .stat-box-label {
            font-size: 0.6rem;
            font-weight: 500;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--ink-light);
            margin-top: 3px;
            display: block;
        }

        /* BARRA DE PROGRESO */
        .progress-section {
            padding: 0 0 4px;
        }
        .progress-labels {
            display: flex;
            justify-content: space-between;
            font-size: 0.6rem;
            font-weight: 500;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--ink-light);
            margin-bottom: 5px;
        }
        .progress-track {
            height: 3px;
            background: var(--border);
            border-radius: 2px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(to right, var(--terracotta), var(--gold));
            border-radius: 2px;
            transition: width 0.8s ease;
        }

        /* LISTA DE PARADAS */
        .poi-list {
            flex: 1;
            overflow-y: auto;
            padding: 4px 0 16px;
        }
        .poi-list::-webkit-scrollbar { width: 4px; }
        .poi-list::-webkit-scrollbar-track { background: transparent; }
        .poi-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

        /* Conector entre paradas */
        .poi-connector {
            display: flex;
            align-items: center;
            padding: 0 28px 0 40px;
            height: 26px;
        }
        .connector-line {
            width: 1px;
            background: var(--border);
            height: 100%;
            flex-shrink: 0;
        }
        .connector-dist {
            font-size: 0.67rem;
            color: var(--ink-light);
            padding-left: 12px;
            font-style: italic;
        }

        .poi-item {
            display: flex;
            gap: 14px;
            padding: 12px 28px;
            cursor: pointer;
            transition: background 0.15s;
            align-items: flex-start;
            border-left: 3px solid transparent;
        }
        .poi-item:hover { background: var(--cream); }
        .poi-item.active {
            background: var(--cream);
            border-left-color: var(--terracotta);
            padding-left: 25px;
        }

        .poi-number {
            width: 28px;
            height: 28px;
            background: var(--ink);
            color: var(--cream);
            font-family: 'Playfair Display', serif;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            margin-top: 1px;
            transition: background 0.15s;
        }
        .poi-item.is-first .poi-number { background: var(--terracotta); }
        .poi-item.is-last  .poi-number { background: var(--gold); }
        .poi-item.active   .poi-number { background: var(--terracotta); }

        .poi-info { flex: 1; min-width: 0; }

        .poi-top-row {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 8px;
            margin-bottom: 2px;
        }

        .poi-name {
            font-size: 0.88rem;
            font-weight: 500;
            color: var(--ink);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
        }

        .poi-badge {
            font-size: 0.56rem;
            font-weight: 500;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            padding: 2px 6px;
            border: 1px solid;
            line-height: 1.5;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .poi-badge.inicio { color: var(--terracotta); border-color: var(--terracotta); }
        .poi-badge.fin    { color: var(--gold);       border-color: var(--gold); }

        .poi-cat {
            font-size: 0.67rem;
            color: var(--ink-light);
            margin-bottom: 5px;
        }

        .poi-meta {
            display: flex;
            gap: 12px;
        }
        .poi-visit-time {
            font-size: 0.67rem;
            color: var(--terracotta);
            font-weight: 500;
        }
        .poi-acum-time {
            font-size: 0.67rem;
            color: var(--ink-light);
        }

        /* MAP */
        .map-area { position: relative; }
        #map { width: 100%; height: 100%; }

        @media (max-width: 900px) {
            .page-layout { grid-template-columns: 1fr; grid-template-rows: auto 1fr; height: auto; }
            .sidebar { max-height: 50vh; border-right: none; border-bottom: 1px solid var(--border); }
            .map-area { height: 60vh; }
            header { padding: 0 24px; }
        }
    </style>
</head>
<body>

<header>
    <a href="/" class="logo">Rutas <span>Culturales</span> · Alicante</a>
    <a href="/" class="btn-back">← Nueva ruta</a>
</header>

<div class="page-layout">

    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-eyebrow">Itinerario generado</div>
            <div class="sidebar-title">Tu ruta<br><em style="font-style:italic; color:var(--terracotta);">por Alicante</em></div>

            <div class="stats-row">
                <div class="stat-box">
                    <span class="stat-box-num">{{ num_pois }}</span>
                    <span class="stat-box-label">Paradas</span>
                </div>
                <div class="stat-box">
                    <span class="stat-box-num">{{ tiempo_total }}</span>
                    <span class="stat-box-label">Minutos</span>
                </div>
            </div>

            <div class="progress-section">
                <div class="progress-labels">
                    <span>Progreso de la ruta</span>
                    <span id="progress-label">0 / {{ num_pois }}</span>
                </div>
                <div class="progress-track">
                    <div class="progress-fill" id="progress-fill" style="width: 0%"></div>
                </div>
            </div>
        </div>

        <div class="poi-list" id="poi-list"></div>
    </aside>

    <div class="map-area">
        <div id="map"></div>
    </div>

</div>

<script>
    const rutaData = {{ ruta_json | safe }};
    const tiempoVisita = {{ tiempo_visita_json | safe }};
    const rutaCallesGeoJSON = {{ ruta_calles_json | safe if ruta_calles_json else 'null' }};
    const tiempoTotal = {{ tiempo_total }};
</script>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
    // Distancia en km entre dos POIs
    function distKm(a, b) {
        const R = 6371;
        const dLat = (b.lat - a.lat) * Math.PI / 180;
        const dLon = (b.lon - a.lon) * Math.PI / 180;
        const s = Math.sin(dLat/2) * Math.sin(dLat/2) +
                  Math.cos(a.lat * Math.PI/180) * Math.cos(b.lat * Math.PI/180) *
                  Math.sin(dLon/2) * Math.sin(dLon/2);
        return R * 2 * Math.atan2(Math.sqrt(s), Math.sqrt(1-s));
    }

    function formatDist(km) {
        return km < 1 ? Math.round(km * 1000) + ' m' : km.toFixed(1) + ' km';
    }

    // MAPA
    const map = L.map('map', { zoomControl: true }).setView([rutaData[0].lat, rutaData[0].lon], 14);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap'
    }).addTo(map);

    // MARCADORES
    const markers = [];
    let tiempoAcumulado = 0;

    rutaData.forEach(function(poi, idx) {
        const num = idx + 1;
        const isFirst = idx === 0;
        const isLast  = idx === rutaData.length - 1;
        const tv = tiempoVisita[poi.categoria_principal] || 30;

        if (idx > 0) {
            const prev = rutaData[idx - 1];
            const d = distKm(prev, poi);
            // aprox tiempo desplazamiento (asumimos 4.5 km/h a pie como base visual)
            tiempoAcumulado += Math.round(d / 4.5 * 60) + tv;
        } else {
            tiempoAcumulado += tv;
        }

        const bg = isFirst ? '#C1440E' : isLast ? '#B8954A' : '#1A1612';
        const iconHtml = `<div style="
            width:32px;height:32px;background:${bg};color:#F5F0E8;
            border:2px solid #F5F0E8;border-radius:50%;
            display:flex;align-items:center;justify-content:center;
            font-family:'Playfair Display',serif;font-size:13px;font-weight:700;
            box-shadow:0 2px 8px rgba(0,0,0,0.3);">${num}</div>`;

        const icon = L.divIcon({ className:'', html:iconHtml, iconAnchor:[16,16], popupAnchor:[0,-20] });

        const popupContent = `
            <div style="font-family:'DM Sans',sans-serif;min-width:220px;max-width:280px;">
                <div style="background:#1A1612;color:#F5F0E8;padding:10px 14px;margin:-10px -14px 12px;font-family:'Playfair Display',serif;font-size:1rem;">
                    ${num}. ${poi.nombre}
                </div>
                <div style="font-size:0.68rem;font-weight:500;letter-spacing:0.12em;text-transform:uppercase;color:#C1440E;margin-bottom:8px;">
                    ${poi.categoria_principal || ''}
                </div>
                <p style="font-size:0.82rem;color:#4A4238;line-height:1.55;margin-bottom:10px;">
                    ${poi.descripcion_llm || 'Sin descripción disponible.'}
                </p>
                <div style="font-size:0.7rem;color:#B8954A;border-top:1px solid #D4C9B0;padding-top:8px;display:flex;justify-content:space-between;">
                    <span>⏱ Visita: ~${tv} min</span>
                    ${idx > 0 ? `<span>📍 ${formatDist(distKm(rutaData[idx-1], poi))} desde anterior</span>` : '<span>🚩 Inicio</span>'}
                </div>
            </div>`;

        const marker = L.marker([poi.lat, poi.lon], { icon })
            .addTo(map)
            .bindPopup(popupContent, { maxWidth: 300 });
        markers.push(marker);
    });

    // RUTA
    if (rutaCallesGeoJSON) {
        L.geoJSON(rutaCallesGeoJSON, {
            style: { color: '#C1440E', weight: 4, opacity: 0.75 }
        }).addTo(map);
    } else {
        L.polyline(rutaData.map(p => [p.lat, p.lon]), {
            color: '#C1440E', weight: 3, opacity: 0.7, dashArray: '8,6'
        }).addTo(map);
    }

    const allCoords = rutaData.map(p => [p.lat, p.lon]);
    map.fitBounds(L.latLngBounds(allCoords), { padding: [40, 40] });

    // LISTA LATERAL
    const poiList = document.getElementById('poi-list');
    let acumMin = 0;

    rutaData.forEach(function(poi, idx) {
        const isFirst = idx === 0;
        const isLast  = idx === rutaData.length - 1;
        const tv = tiempoVisita[poi.categoria_principal] || 30;

        // Conector entre paradas (excepto antes de la primera)
        if (idx > 0) {
            const prev = rutaData[idx - 1];
            const d = distKm(prev, poi);
            const tDespl = Math.round(d / 4.5 * 60);
            acumMin += tDespl;

            const conn = document.createElement('div');
            conn.className = 'poi-connector';
            conn.innerHTML = `
                <div class="connector-line"></div>
                <div class="connector-dist">${formatDist(d)} · ~${tDespl} min desplazamiento</div>
            `;
            poiList.appendChild(conn);
        }

        acumMin += tv;

        const badge = isFirst ? '<span class="poi-badge inicio">Inicio</span>'
                    : isLast  ? '<span class="poi-badge fin">Final</span>'
                    : '';

        const item = document.createElement('div');
        item.className = 'poi-item' + (isFirst ? ' is-first' : '') + (isLast ? ' is-last' : '');
        item.dataset.idx = idx;
        item.innerHTML = `
            <div class="poi-number">${idx + 1}</div>
            <div class="poi-info">
                <div class="poi-top-row">
                    <div class="poi-name">${poi.nombre}</div>
                    ${badge}
                </div>
                <div class="poi-cat">${poi.categoria_principal || ''}</div>
                <div class="poi-meta">
                    <span class="poi-visit-time">⏱ ${tv} min visita</span>
                    <span class="poi-acum-time">~${acumMin} min acumulados</span>
                </div>
            </div>
        `;

        item.addEventListener('click', function() {
            document.querySelectorAll('.poi-item').forEach(el => el.classList.remove('active'));
            item.classList.add('active');
            map.setView([poi.lat, poi.lon], 16, { animate: true });
            markers[idx].openPopup();
            updateProgress(idx + 1);
        });

        poiList.appendChild(item);
    });

    // PROGRESO
    function updateProgress(visitados) {
        const pct = (visitados / rutaData.length) * 100;
        document.getElementById('progress-fill').style.width = pct + '%';
        document.getElementById('progress-label').textContent = visitados + ' / ' + rutaData.length;
    }

    // Clic en marcador activa lateral
    markers.forEach(function(marker, idx) {
        marker.on('click', function() {
            document.querySelectorAll('.poi-item').forEach(el => el.classList.remove('active'));
            const items = document.querySelectorAll('.poi-item');
            if (items[idx]) {
                items[idx].classList.add('active');
                items[idx].scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }
            updateProgress(idx + 1);
        });
    });
</script>

</body>
</html>
